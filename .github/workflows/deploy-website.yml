name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - "website/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to S3 + CloudFront
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Add security headers config
        run: |
          # Create CloudFront function for security headers
          cat > website/_headers.json << 'EOF'
          {
            "X-Content-Type-Options": "nosniff",
            "X-Frame-Options": "DENY",
            "X-XSS-Protection": "1; mode=block",
            "Referrer-Policy": "strict-origin-when-cross-origin",
            "Content-Security-Policy": "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'"
          }
          EOF

      - name: Sync to S3
        run: |
          aws s3 sync website/ s3://${{ secrets.S3_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=86400" \
            --exclude "_headers.json" \
            --exclude "*.map"

          # Set longer cache for assets
          aws s3 sync website/css/ s3://${{ secrets.S3_BUCKET }}/css/ \
            --cache-control "public, max-age=31536000, immutable"
          aws s3 sync website/js/ s3://${{ secrets.S3_BUCKET }}/js/ \
            --cache-control "public, max-age=31536000, immutable"
          aws s3 sync website/assets/ s3://${{ secrets.S3_BUCKET }}/assets/ \
            --cache-control "public, max-age=31536000, immutable"

          # Short cache for HTML (for fast updates)
          aws s3 cp website/index.html s3://${{ secrets.S3_BUCKET }}/index.html \
            --cache-control "public, max-age=300"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DIST_ID }} \
            --paths "/*"

      - name: Deployment summary
        run: |
          echo "## 🌐 Website Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **S3 Bucket:** ${{ secrets.S3_BUCKET }}" >> $GITHUB_STEP_SUMMARY
          echo "- **CloudFront:** Invalidation started" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
