<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chat</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <!-- Settings Modal -->
    <div id="settingsModal" class="modal hidden">
      <div class="modal-backdrop" onclick="closeSettings()"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2 data-i18n="settings">Settings</h2>
          <button class="modal-close" onclick="closeSettings()">×</button>
        </div>
        <div class="modal-body">
          <label class="setting-label" style="margin-top: 0" data-i18n="language">Language</label>
          <select id="settingsLanguage" class="setting-select"></select>

          <label class="setting-label" data-i18n="memory">Memory</label>
          <div class="memory-row">
            <span id="memoryCount"></span>
            <button onclick="clearAllMemory()" class="btn-danger btn-sm" id="clearMemoryBtn" data-i18n="clearAll">Clear All</button>
          </div>
        </div>
        <div class="modal-footer">
          <button onclick="saveSettings()" class="btn-primary" data-i18n="save">Save</button>
        </div>
      </div>
    </div>

    <!-- Main Layout -->
    <div class="app">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <button class="btn-new-chat" onclick="newChat()">
            <span class="icon">+</span> <span data-i18n="newChat">New chat</span>
          </button>
        </div>
        <div class="sidebar-conversations" id="conversationList"></div>
        <div class="sidebar-footer">
          <button class="sidebar-btn" onclick="shareConversation()">
            <span class="icon">📤</span> <span data-i18n="shareConversation">Share Conversation</span>
          </button>
          <button class="sidebar-btn" onclick="openSettings()">
            <span class="icon">⚙</span> <span data-i18n="settings">Settings</span>
          </button>
        </div>
      </aside>

      <!-- Sidebar toggle for mobile -->
      <button
        class="sidebar-toggle"
        id="sidebarToggle"
        onclick="toggleSidebar()"
      >
        ☰
      </button>

      <!-- Chat Area -->
      <main class="chat-area">
        <!-- Empty State -->
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">✦</div>
          <h1 data-i18n="emptyTitle">AI Chat</h1>
          <p data-i18n="emptySubtitle">How can I help you today?</p>
        </div>

        <!-- Messages -->
        <div class="messages" id="messages"></div>

        <!-- Input Bar -->
        <div class="input-bar">
          <div class="input-container">
            <textarea
              id="messageInput"
              data-i18n-placeholder="inputPlaceholder"
              placeholder="Type your message..."
              rows="1"
              onkeydown="handleKeyDown(event)"
              oninput="autoResize(this)"
            ></textarea>
            <button class="btn-send" id="sendBtn" onclick="sendMessage()">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path
                  d="M7 11L12 6L17 11M12 18V7"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
          </div>
          <p class="disclaimer" data-i18n="disclaimer">
            AI can make mistakes. Verify important information.
          </p>
        </div>
      </main>
    </div>

    <script src="/static/translations.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
