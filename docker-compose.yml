version: "3.8"

services:
  model-maker:
    build: .
    container_name: model-maker
    ports:
      - "8000:8000"
    volumes:
      # Persist conversations and memory
      - model-maker-data:/app/app/data
      # Mount your GGUF model file (download first with: python models/download.py)
      - ./models:/app/models:ro
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  model-maker-data:
